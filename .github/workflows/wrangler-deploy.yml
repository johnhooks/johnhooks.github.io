name: Reusable Workflow - Wrangler Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: Environment to deploy (production or staging)
      site_url:
        required: true
        type: string
        description: Site URL for build
      ref:
        required: false
        type: string
        description: Git ref to deploy
        default: ""
      worker_name:
        required: true
        type: string
        description: Worker name to deploy
      domains:
        required: false
        type: string
        description: Comma-separated custom domains for this environment
        default: ""
    secrets:
      cloudflare_api_token:
        required: true
      cloudflare_account_id:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm build
        env:
          SITE_URL: ${{ inputs.site_url }}

      - name: Deploy to Cloudflare
        run: |
          domain_args=()
          IFS=',' read -ra domains <<< "$DOMAINS"
          for domain in "${domains[@]}"; do
            if [[ -n "$domain" ]]; then
              domain_args+=(--domain "$domain")
            fi
          done

          pnpm wrangler deploy \
            --env "$ENVIRONMENT" \
            --name "$WORKER_NAME" \
            "${domain_args[@]}" \
            --var "ENVIRONMENT:$ENVIRONMENT" \
            --var "SITE_URL:$SITE_URL"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.cloudflare_api_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.cloudflare_account_id }}
          ENVIRONMENT: ${{ inputs.environment }}
          WORKER_NAME: ${{ inputs.worker_name }}
          SITE_URL: ${{ inputs.site_url }}
          DOMAINS: ${{ inputs.domains }}
